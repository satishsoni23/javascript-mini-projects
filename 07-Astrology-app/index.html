<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology app</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="parent">
      <h1>Astrology Insights</h1>
      <form>
        <label for="firstname">First name</label>
        <input type="text" id="firstname" name="firstname" required />
       

        <label for="surname">Surname</label>
        <input type="text" id="surname" name="surname" required />
    

        <label for="year">Dob(Year)</label>
        <input type="number" id="year" name="year" max="2026" required />
        

        <label for="month">Dob(Month)</label>
        <input type="number" id="month" name="month" min="1" max="12" required />
        

        <label for="date">Dob(Date)</label>
        <input type="number" id="date" name="date" min="1" max="31" required />
        

        <button type="submit" value="get Insights">Submit</button>
        
      </form>
      <div id="result"></div>
    </div>
  </body>
  <script src="./scripts.js"></script>
</html>
